name: Atualizar Painel PH

on:
  workflow_dispatch: # Botão manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá poder de escrita ao robô
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Requests
        run: pip install requests

      - name: Executar Buscador PH
        run: python buscador.py

      - name: Salvar Mudanças
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "PH-Programador"
          git config --global user.email "ph@dev.com"
          
          # Verifica se o arquivo foi realmente criado pelo Python
          if [ -f index.html ]; then
            git add index.html
            # Só faz o commit se houver mudanças reais
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Canais atualizados" && git push)
          else
            echo "Erro: O arquivo index.html não foi gerado pelo buscador.py"
            exit 1
          fi
