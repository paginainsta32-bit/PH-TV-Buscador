name: Atualizar Painel PH

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Opcional: atualiza sozinho todo dia à meia-noite

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Versão v4 atualizada

      - name: Configurar Python
        uses: actions/setup-python@v5 # Versão v5 atualizada
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: pip install requests

      - name: Rodar Buscador
        run: python buscador.py

      - name: Salvar Mudanças
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "PH-Programador"
          git config --global user.email "ph@dev.com"
          git add index.html
          git commit -m "Update: Novos sinais de TV" || echo "Sem mudanças"
          git push
